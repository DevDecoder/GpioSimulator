<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDecoder GPIO Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Golden Layout Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@2.6.0/dist/css/goldenlayout-base.css">
    <link id="golden-layout-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@2.6.0/dist/css/themes/goldenlayout-dark-theme.css">
    
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
    <!-- Top Menu Bar -->
    <div id="menu-bar">
        <div class="menu-items">
            <div class="brand-logo" title="DevDecoder GpioSimulator">
                <svg viewBox="0 0 632 809.7" width="20" height="20">
                    <path fill="var(--accent)" d="M592.6,605.6c-0.1-3.2-0.2-6-0.7-10.9c-19.6,15.7-39.6,28-62.6,34.8c-22.9,6.8-46.1,8.7-71.6,3.7c3.8-2.5,5.9-4,8-5.2c51.9-30.3,88.2-73.4,109-128.6c23.3-61.9,26.5-125.6,15.3-190c-9.6-55.5-32.7-105.1-74-145.4c-4.6-4.5-3.3-7.5-0.6-11.9c25.9-42.6,51.8-85.2,77.6-127.9h-9.7c-19.3,31.8-38.5,63.5-57.8,95.3c-1.9,3.1-4,6.1-5.8,8.9c-12.9-8.7-24.5-17.3-36.9-24.6c-54.2-32-114-42.9-176.4-43.2c-58.5-0.3-117-0.1-175.5-0.1h-10.3v50.4H36v467.4h85.3v69.4h83.5c-27.3,45-54.2,89.4-81,133.5h9.7c20.9-34.5,41.9-69,62.7-103.6c3.5-5.8,7.3-7.8,14-7.7c25.5,0.4,51.1,1.1,76.6-0.1c27.3-1.2,54.6-4,81.8-7c7.1-0.8,14.3,0.5,20.8,3.5c65.2,29.7,130.2,27.5,195-2c6.5-3,8.6-6.8,8.5-14.5C592.5,623.1,593.1,620.7,592.6,605.6z M581,320.3c-51.1-23.6-103.8-23.7-159.9-12.6c28.8-47.6,56.5-93.2,84.5-139.4C543,199.9,576,263.2,581,320.3z M138.3,69.9c62.9,0.1,125.9-1.2,188.8,0.8c64.4,2,124.5,19.3,176.4,58.6c11.1,8.4,11.1,8.5,3.8,20.4c-22.1,36.4-44.1,72.7-66.2,109.1c-1.6,2.7-3.5,5.2-5.9,8.7c-1.5-3.4-2.5-5.7-3.4-8c-34.2-82.7-97.2-130.4-187-143c-33-4.6-66.8-3.9-100.3-5.5c-4.1-0.2-8.2,0-13.1,0c0-14.2,0-27.6,0-40.8C133.7,69.7,136,69.9,138.3,69.9z M132.3,344.1c0-48.7,0.2-97.3-0.2-146c-0.1-7.7,2.3-9.8,10.1-9.7c33.6,0.1,67.1,0.2,99.5,10.4c60.9,19.1,93.8,61.3,103.7,121.6c6.2,37.5-0.7,73.3-20.4,106.2c-23.4,39.3-60.2,60.5-104.7,67.9c-26.7,4.4-54.3,3.9-81.4,5.7c-7.8,0.5-6.6-4.8-6.6-9.3C132.3,442,132.3,393.1,132.3,344.1z M131.3,638.1v-58.8c39.2-1.7,78.1-3.4,118-5.2c-2.2,3.7-4.4,7.6-6.7,11.5c-9.5,15.7-18.9,31.5-28.7,47c-1.5,2.3-3.1,5.3-7.1,5.3C181.9,637.8,157.1,638.1,131.3,638.1z M206.7,660.9c26.2-43.2,51.3-84.5,76.3-125.8c0.2,0,0.2,0,0.4,0.1c10.4,50,39,87.7,82.3,118.3C312.1,664.5,260.4,659.4,206.7,660.9z M432.8,626.9c-57-19.3-93.5-71.7-93.1-132.8c0.4-68.5,41.3-122.1,105.8-137.4c48.7-11.6,93.6-2.8,134.1,26.1c2.9,2.1,6.2,6.3,6.1,9.4c-3,73.5-23.4,140.8-79.7,192.9c-17.2,15.9-39,29.5-59.8,41.8C442.5,629.4,437.2,628.4,432.8,626.9z"/>
                </svg>
                <span class="brand-name"><strong>GPIO</strong>Simulator</span>
            </div>
            <div class="menu-item-group" style="display: none;">
                <button class="menu-trigger">File</button>
                <div class="menu-dropdown">
                    <button id="menu-file-open" class="dropdown-item">Open</button>
                    <button id="menu-file-save" class="dropdown-item">Save Layout</button>
                </div>
            </div>
            <div class="menu-item-group">
                <button class="menu-trigger">View</button>
                <div class="menu-dropdown">
                    <button id="menu-view-components" class="dropdown-item">Components</button>
                    <button id="menu-view-logs" class="dropdown-item">Logs</button>
                </div>
            </div>
        </div>
        <!-- Center-aligned Operations Toolbar in the Menu/Title Bar -->
        <div id="canvas-toolbar">
            <button id="tool-pointer" class="tool-btn active" title="Pointer (Select & Interact)">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M7,2l12,11.2l-5.8,1.5l3.4,6.7l-2.7,1.3l-3.4-6.8L7,20V2z"/></svg>
            </button>
            <button id="tool-connector" class="tool-btn" title="Connector (Draw Wires)">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M19,19H5V5h14V19z M12,6h2v6h-2V6z M10,12h4v2h-4V12z M10,15h4v2h-4V15z"/></svg>
            </button>
            <button id="tool-delete" class="tool-btn" title="Delete wire/component">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6,19c0,1.1,0.9,2,2,2h8c1.1,0,2-0.9,2-2V7H6V19z M19,4h-3.5l-1-1h-5l-1,1H5v2h14V4z"/></svg>
            </button>
            <span class="tool-separator"></span>
            <span id="active-tool-badge" class="tool-badge">Pointer</span>
        </div>
        <div class="menu-controls">
            <button id="theme-toggle" class="control-btn" title="Toggle Light/Dark Theme">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </div>
    
    <!-- Main Full-Screen Layout Workspace -->
    <main id="layout-container"></main>

    <!-- Hidden Template Panels Repository (Adopted by Golden Layout) -->
    <div id="component-templates" style="display: none;">
        <!-- Board Workspace Template -->
        <div id="board-container">
            <div id="visual-board"></div>

            <!-- Zoom Controls Pill -->
            <div id="zoom-controls">
                <button id="zoom-in"  class="zoom-btn" title="Zoom In">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
                </button>
                <button id="zoom-out" class="zoom-btn" title="Zoom Out">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19,13H5V11H19V13Z"/></svg>
                </button>
                <button id="zoom-fit" class="zoom-btn" title="Fit Board to Screen">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M4,4H10V6H6V10H4V4M20,4V10H18V6H14V4H20M4,20V14H6V18H10V20H4M20,20H14V18H18V14H20V20Z"/></svg>
                </button>
            </div>
        </div>

        <!-- Terminal Log Pane Template -->
        <div id="terminal-panel">
            <h3>Real-Time Activity Log</h3>
            <div id="terminal-log"></div>
        </div>

        <!-- Components Panel Template -->
        <div id="components-panel" class="workspace-pane">
            <div class="components-category">
                <h3>Available Boards</h3>
                <div id="boards-list" class="components-grid">
                    <!-- Dynamic selector cards go here -->
                </div>
            </div>
            <div class="components-category">
                <h3>Discrete Components</h3>
                <div id="discrete-components-list" class="components-grid">
                    <div class="component-card disabled" title="Available in future update">
                        <span class="comp-icon">💡</span>
                        <span class="comp-name">LED Indicator</span>
                    </div>
                    <div class="component-card disabled" title="Available in future update">
                        <span class="comp-icon">🔘</span>
                        <span class="comp-name">Push Button</span>
                    </div>
                    <div class="component-card disabled" title="Available in future update">
                        <span class="comp-icon">⚡</span>
                        <span class="comp-name">Resistor</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Input for Custom Files Upload -->
    <input type="file" id="file-picker" style="display: none;" accept=".gsc,.gsl">

    <div id="disconnected-overlay">
        <div class="overlay-card">
            <div class="overlay-icon">🔌</div>
            <h2>Simulator Disconnected</h2>
            <p>The simulator web server has shut down.</p>
            <p class="sub-text">You can now close this browser tab safely.</p>
            <div class="reconnect-status">
                <span class="pulse-dot"></span>
                Attempting to reconnect...
            </div>
        </div>
    </div>

    <!-- panzoom UMD — must load before main.js module executes -->
    <script defer src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
    <!-- Script registered as ES module for dynamic CDN imports -->
    <script type="module" src="main.js?v=7"></script>
</body>
</html>
